<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FRYD — Tu plataforma de productividad personal. Organiza tareas, mejora hábitos, registra tu diario y recibe apoyo de un asistente IA." />
    <meta name="theme-color" content="#0a0f1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>FRYD — Productividad Personal</title>
    <script>
      (function() {
        const theme = localStorage.getItem('fryd_theme');
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        }
        const gradient = localStorage.getItem('fryd_avatar_gradient');
        if (gradient) {
          document.documentElement.style.setProperty('--profile-gradient', gradient);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
